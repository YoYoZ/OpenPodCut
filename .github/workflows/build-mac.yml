name: Build macOS

on:
  workflow_dispatch:   # run manually from GitHub UI at any time
  push:
    tags:
      - 'v*'           # run automatically when you push a version tag

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: analyzer/requirements.txt

      - name: Install dependencies
        run: |
          cd analyzer
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build analyzer binary
        run: |
          cd analyzer
          pyinstaller \
            --onedir \
            --noupx \
            --noconfirm \
            --name analyzer \
            --distpath ../cep-extension/bin \
            --workpath build/work \
            --specpath build \
            --collect-all silero_vad \
            --collect-all torchaudio \
            --collect-all soundfile \
            --hidden-import torchaudio \
            --hidden-import torchaudio.functional \
            --hidden-import torchaudio.transforms \
            --hidden-import soundfile \
            analyzer.py

      - name: Make binary executable
        run: chmod +x cep-extension/bin/analyzer/analyzer

      - name: Get version from manifest
        id: version
        run: |
          VER=$(grep -o 'ExtensionBundleVersion="[^"]*"' cep-extension/CSXS/manifest.xml \
               | grep -o '"[^"]*"' | tr -d '"')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Building version $VER"

      - name: Package release zip
        run: |
          zip -r "OpenPodCut-v${{ steps.version.outputs.version }}-mac.zip" \
            cep-extension/ \
            install/install.sh \
            install/enable_debug_mode.sh \
            README.md \
            LICENSE

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenPodCut-mac
          path: "OpenPodCut-v${{ steps.version.outputs.version }}-mac.zip"
          retention-days: 14

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "OpenPodCut-v${{ steps.version.outputs.version }}-mac.zip"
